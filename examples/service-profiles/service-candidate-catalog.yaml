service_candidate_catalog:
  metadata:
    catalog_id: bookmark_service_candidate_catalog
    title: Bookmark Service Candidate Catalog
    version: "1.0.1"
    status: non_normative_example_catalog
    normative_status: candidate_examples_not_requirements
    source_basis:
    - user_provided_bookmark_screenshot
    - maintainer_service_profile_review
    public_safe: true
    contains_no_credentials: true
    contains_no_private_tokens: true
    contains_no_restricted_links: true
    purpose: Machine-readable catalog of bookmark-derived service candidates for the Documentation Protocol service integration
      profile.
    disclosure_rule: Record public landing pages, profile pages, DOIs, identifiers, or publication URLs only.
  services:
  - service_id: google_scholar
    service_name: Google Scholar
    service_type: scholarly_profile_and_index
    candidate_role_ids:
    - scholarly_discovery_profile
    - metadata_and_indexing
    recommended_use: Public scholarly profile and discovery/indexing layer for author works and citations.
    evidence_to_capture:
    - profile_url
    - indexed_work_urls
    - profile_scope_note
    public_url: ''
    public_identifier: ''
    public_safe_note: Record public landing pages, profile pages, DOIs, identifiers, or publication URLs only. Do not record
      private account, dashboard, token, or submission-console URLs.
  - service_id: arxiv
    service_name: arXiv
    service_type: preprint_platform
    candidate_role_ids:
    - preprint_or_paper_dissemination
    recommended_use: Preprint dissemination venue for physics, mathematics, computer science, quantitative biology, quantitative
      finance, statistics, electrical engineering, systems science, and economics.
    evidence_to_capture:
    - preprint_identifier
    - version_note
    - submission_status
    public_url: ''
    public_identifier: ''
    public_safe_note: Record public landing pages, profile pages, DOIs, identifiers, or publication URLs only. Do not record
      private account, dashboard, token, or submission-console URLs.
