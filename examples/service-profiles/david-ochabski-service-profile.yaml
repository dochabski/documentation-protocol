service_integration_profile:
  profile_id: david_ochabski_service_profile_v0_2_0
  profile_label: David Ochabski Current Quality Artifact Service Ecosystem
  normative_status: non_normative_example
  artifact_or_package_id: documentation_protocol_and_dsr_quality_artifacts
  target_conformance_level: l5_archival_publication_ready
  version: "1.0.0"
  status: non_normative_example
  owner_or_maintainer: David Ochabski
  governing_rule: This example does not require other users to use these platforms.
  disclosure_policy:
    contains_no_credentials: true
    contains_no_private_tokens: true
    contains_no_restricted_links: true
    public_safe: true
    notes: Public-safe service names only; account-private details belong in private records.
  branch_policy:
    feature_branch_used_for_implementation: feature/service-integration-profile-bookmarks-v2
    long_lived_branch_used_for_service_variant: false
    variant_storage_location: examples/service-profiles/
  service_roles:
  - role_id: working_storage
    role_obligation: recommended
    integration_status: used
    selected_services:
    - service_name: Dropbox
      service_type: cloud_storage
      service_url: ''
    notes: Working files, source material staging, exports, and backups.
  - role_id: source_control_and_change_management
    role_obligation: highly_recommended
    integration_status: used
    selected_services:
    - service_name: GitHub
      service_type: source_control
      service_url: https://github.com/dochabski/documentation-protocol
    - service_name: GitHub
      service_type: source_control
      service_url: https://github.com/dochabski/dsr-framework
    notes: Primary working hub for protocol and DSR framework artifacts.
  - role_id: persistent_contributor_identity
    role_obligation: recommended
    integration_status: used
    selected_services:
    - service_name: ORCID
      service_type: persistent_contributor_identifier
      service_url: https://orcid.org/0009-0000-9117-0651
  - role_id: doi_archival_deposit
