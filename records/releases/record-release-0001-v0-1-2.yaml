    - non_normative_david_ochabski_service_profile
    - service_candidate_catalog_v0_2
  validation_status:
    yaml_json_cff_parse: pass
    service_profile_schema_validation: pass_for_david_example_profile
    git_diff_check: pass
    no_source_pdf_or_archive_files: pass
    no_credentials_or_private_links: pass_policy_language_only
    no_named_v0_2_service_required: pass
