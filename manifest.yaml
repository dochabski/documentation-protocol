# SPDX-License-Identifier: CC0-1.0
protocol:
  id: documentation_protocol
  title: Documentation Protocol
  version: "1.0.1"
  status: l4_reusable_stable
  generated_date: "2026-04-24"
  source_of_truth_format: yaml
  publication_render_format: markdown
  working_hub: GitHub
  archival_position: >
    GitHub is the working collaboration hub. Immutable, DOI-backed releases
    should be deposited in an archival repository or registry during release.
source_policy:
  default: uploaded_project_corpus_only
  outside_sources_allowed: false
  governing_principle: >
    Every governed artifact must be understandable, inspectable, citable,
    exercisable where applicable, evaluable, reusable, and preservable at the
    level appropriate to its type and claim.
source_citation_policy:
  local_source_file_names_exposed: false
  rule: >
    Public protocol files should cite source families, standards, scholarly
    works, or internal project-control citations instead of local source file
    names, local paths, or conversion artifact names.
source_families:
  - id: md_guides
    role: >
      Markdown guides for artifact badging, DSR, FAIR research software,
      GitHub documentation, standards references, architecture description, and
      documentation quality.
  - id: isos_and_more
    role: >
      Standards-derived material for lifecycle information items, architecture
      views, systems documentation, conformance logic, and stewardship.
  - id: dsr_corpus
    role: >
      Design science research corpus for artifact types, contribution logic,
      lifecycle, transparency, evaluation, contribution positioning,
      generalization, and publication.
  - id: data_and_information
    role: >
      Data, information, system, metadata, and evidence quality material for
      quality dimensions, measurement, and review.
  - id: protocol_project_decision
    role: >
      Internal protocol design decision material used to encode optional,
      vendor-neutral service-role guidance and non-normative example profiles.
source_citations:
  - id: project_control_scaffold_2026
    type: internal_project_control_model
    citation: >
      Documentation Protocol Builder project-control scaffold, internal draft
      specification, 2026.
    supports: [product_catalog, part_work_breakdown, controlled_models, generation_workflow]
  - id: service_integration_profile_decision_2026
    type: internal_project_decision
    citation: >
      Documentation Protocol service integration profile decision, internal
      implementation package, 2026.
    supports: [service_integration_profile, service_role_vocabulary, service_integration_templates, non_normative_example_profiles]
  - id: acm_artifact_badging_policy_2020
    type: policy
    citation: >
      Association for Computing Machinery. Artifact Review and Badging Policy,
      version 1.1, 2020.
    supports: [artifact_review, badging, archival_requirements, artifact_appendix]
  - id: niso_rp_31_2021
    type: recommended_practice
    citation: >
      National Information Standards Organization. Reproducibility Badging and
      Definitions: A Recommended Practice, NISO RP-31-2021, 2021.
    supports: [reproducibility_terms, badging_alignment]
  - id: hevner_et_al_2004
    type: scholarly_work
    citation: >
      Hevner, A. R., March, S. T., Park, J., and Ram, S. Design Science in
      Information Systems Research. MIS Quarterly, 28(1), 2004.
