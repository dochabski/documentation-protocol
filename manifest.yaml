    supports: [readme, changelog, contributing, repository_structure, reproducibility_package]
canonical_directories:
  - path: specs
    purpose: YAML source-of-truth specifications for protocol products.
  - path: docs/protocol
    purpose: Human-facing protocol index and future rendered documentation.
  - path: docs/validation
    purpose: Human-facing validation summaries and pilot-validation explanations.
  - path: vocabularies
    purpose: Controlled vocabularies used by templates, checklists, schemas, and examples.
  - path: templates
    purpose: Reusable starter files for applying the protocol.
  - path: checklists
    purpose: Operational readiness and review checklists.
  - path: schemas
    purpose: JSON schemas for validating generated YAML and JSON files.
  - path: crosswalks
    purpose: Protocol-to-pilot, source-to-product, and evidence mapping files.
  - path: records
    purpose: Change, review, evaluation, validation, release, preservation, registry, and roadmap records.
  - path: records/validations
    purpose: Retained validation records, including pilot and self-application validation evidence.
  - path: records/roadmap
    purpose: Retained roadmap, next-validation-tier, and improvement planning records.
  - path: examples
    purpose: Placeholder for future pilot artifact packages.
  - path: examples/service-profiles
    purpose: Non-normative and project-specific service integration example profiles.
  - path: prompts/codex
    purpose: Codex handoff prompts for future implementation or maintenance work.
product_catalog: specs/product-catalog.yaml
conformance:
  package_conformance: l4_reusable_stable
  l5_claimed: false
  conformance_declaration: conformance-declaration.yaml
  current_release_record: records/releases/record-release-0003-v1-0-1.yaml
  current_release_approval: records/releases/record-release-approval-0002-v1-0-1.yaml
  readiness_review: records/reviews/record-review-l4-readiness-0001-v1-0-0.yaml
