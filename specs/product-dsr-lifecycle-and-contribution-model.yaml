# SPDX-License-Identifier: CC0-1.0
product:
  id: dsr_lifecycle_and_contribution_model
  title: DSR Lifecycle and Contribution Model
  purpose: >
    Define artifact types, design science research knowledge contributions,
    lifecycle stages, design strategy families, evaluation alignment, and
    transparency, contribution positioning, and generalization logic for
    artifacts governed by the protocol.
  status: draft
version: "0.1.2"
source_basis:
  - dsr_corpus
  - md_guides
dependencies:
  - protocol_foundation
sections:
  - id: identity_and_purpose
    title: Identity and Purpose
    purpose: Define the DSR scope of the protocol.
    content:
      applies_to:
        - design_science_research_artifacts
        - research_software_used_as_dsr_instantiation
        - artifact_methods_models_constructs_and_design_principles
        - artifact_evaluation_and_generalization_records
      primary_outputs:
        - dsr_lifecycle_model
        - artifact_taxonomy
        - knowledge_contribution_model
        - design_strategy_model
        - evaluation_alignment_model
        - dsr_transparency_model
        - contribution_positioning_model
  - id: conceptual_model
    title: Conceptual Model
    purpose: Define DSR artifact and contribution concepts.
    content:
      artifact_types:
        - id: construct
          definition: Defined concept, vocabulary, typology, classification, or conceptual primitive.
          typical_outputs: [glossary, ontology, taxonomy, controlled_vocabulary]
        - id: model
          definition: Representation of entities, relationships, processes, structures, mechanisms, or architectures.
          typical_outputs: [process_model, architecture_model, data_model, causal_model, conceptual_map]
        - id: method
          definition: Prescriptive procedure or technique for achieving a defined goal.
          typical_outputs: [protocol, workflow, algorithm, evaluation_method, packaging_method]
        - id: instantiation
          definition: Realized artifact implemented in a concrete setting or technical form.
          typical_outputs: [repository, software_tool, template_suite, documentation_system, database]
        - id: design_principle
          definition: Generalized prescriptive statement derived from design and evaluation experience.
          typical_outputs: [principle_catalog, pattern_language, design_rule_set]
        - id: design_theory
          definition: Integrated package of meta-requirements, meta-design, kernel theory, design propositions, artifact logic, and evidence.
          typical_outputs: [design_theory_report, theory_schema, testable_propositions]
      knowledge_scope:
        - id: local_or_idiographic
          meaning: Applies to one case, site, organization, project, artifact instance, or bounded local context.
        - id: projectable_to_problem_class
          meaning: Applies plausibly to a bounded class of similar problems or contexts when transfer conditions are satisfied.
        - id: mixed
          meaning: Combines local evidence with partially generalized or projectable design knowledge.
        - id: nomothetic_or_general
          meaning: Intended to apply broadly across a defined class of cases, artifacts, or problem contexts.
        - id: not_yet_established
          meaning: Evidence is insufficient to define transfer or generalization scope.
      knowledge_goals:
        - definitional
        - descriptive
        - explanatory
        - predictive
        - explanatory_predictive
        - prescriptive
        - methodological
        - evaluative
        - normative
      lifecycle_stages:
        - problem_analysis
        - objectives_and_requirements
        - design_and_development
        - demonstration
        - evaluation
        - generalization
        - communication_and_publication
        - maintenance_and_evolution
      lifecycle_extension_profiles:
        - id: dsr_framework_expanded_lifecycle
          status: approved_extension_profile
          purpose: Map the Documentation Protocol lifecycle to the expanded DSR Framework lifecycle used in the first validation case.
          crosswalk:
            - protocol_stage: problem_analysis
              dsr_framework_stages:
                - problem_space_initiation
            - protocol_stage: objectives_and_requirements
              dsr_framework_stages:
                - objectives_and_requirements
            - protocol_stage: design_and_development
              dsr_framework_stages:
                - solution_space_grounding
                - contribution_positioning
                - artifact_design_and_specification
                - build_or_instantiation
            - protocol_stage: demonstration
              dsr_framework_stages:
                - demonstration
            - protocol_stage: evaluation
              dsr_framework_stages:
                - evaluation
            - protocol_stage: generalization
              dsr_framework_stages:
                - contribution_synthesis
            - protocol_stage: communication_and_publication
              dsr_framework_stages:
                - communication_and_packaging
            - protocol_stage: maintenance_and_evolution
              dsr_framework_stages:
                - iteration_and_accumulation
          rule: Downstream DSR packages may use this expanded lifecycle only when they declare the extension profile and preserve traceability back to the canonical protocol lifecycle.
      design_strategy_families:
        - build_and_instantiate
        - build_and_generalize_from_instantiation
        - hypothesize_and_test
        - build_design_theory
      transparency_dimensions:
        - id: process_transparency
          focus: Actual DSR activities, sequence, reasoning, collaborators, deviations, and decision points.
        - id: problem_space_transparency
          focus: Application context, stakeholders, improvement goals, scope, timeframe, constraints, and boundaries.
        - id: solution_space_transparency
          focus: Kernel theories, justificatory knowledge, existing artifacts, technologies, and design knowledge bases.
        - id: build_transparency
          focus: Construction choices, creative search, alternatives considered, rejected options, collaboration, and emergent changes.
        - id: evaluation_transparency
          focus: Formative and summative evaluation, artificial or naturalistic setting, criteria, evidence, and stakeholder confidence.
        - id: contribution_transparency
          focus: Practice contribution, scientific contribution, novelty basis, knowledge scope, knowledge goal, and transfer conditions.
      evaluation_strategy_dimensions:
        evaluation_timing: [formative, summative, both]
        evaluation_setting: [artificial, naturalistic, mixed]
        validity_dimensions:
          - technical_validity
          - purpose_validity
          - design_validity
          - generalization_validity
      contribution_positioning_types:
        - routine_design
        - improvement
        - exaptation
        - invention
        - method_extension
        - synthesis
        - theory_building
  - id: normative_requirements
    title: Normative Requirements
    purpose: Define DSR documentation requirements.
    content:
      must:
        - Every DSR artifact must declare one or more artifact types from the controlled taxonomy.
        - Every DSR artifact must describe its problem context, objectives, design rationale, evaluation evidence, and contribution claim.
        - Every contribution claim must state whether its scope is local_or_idiographic, projectable_to_problem_class, mixed, nomothetic_or_general, or not_yet_established.
        - Every evaluation record must connect evaluated artifact components to claims.
        - Every generalization claim must state the basis for transfer beyond the original context.
        - Every L2 or higher DSR package must complete or explicitly tailor the six-part DSR transparency crosswalk.
        - Every L2 or higher DSR package must state problem-space, solution-space, build, evaluation, and contribution transparency evidence.
        - Every evaluation plan must distinguish evaluation timing, evaluation setting, method family, validity basis, stakeholder confidence basis, and claim-to-component mapping.
        - Every contribution claim must have a contribution-positioning record or equivalent section.
        - Every DSR package using lifecycle stages, knowledge goals, or knowledge scopes beyond the canonical protocol values must declare the applicable extension profile and map extension values to protocol-controlled values.
        - Every L3 or higher DSR package must include retained records for design decisions, tailoring decisions, evaluation, review, and preservation, unless a not_applicable rationale is recorded.
      should:
        - Authors should distinguish artifact utility, artifact quality, and contribution to knowledge.
        - Authors should describe design strategies and why they fit the problem context.
        - Authors should document negative, partial, or bounded evaluation results.
        - Reviewers should evaluate DSR claims against declared artifact type and lifecycle stage.
        - Authors should document alternatives considered and rejected when those decisions affect contribution scope or reuse.
        - Authors should document any privacy, security, intellectual-property, proprietary, or maintenance limits on transparency.
      may:
        - A package may include multiple artifact types when the contribution is compound.
        - A package may remain at a local_or_idiographic contribution level when generalization evidence is not yet available.
      must_not:
        - Authors must not claim a design theory when only an unevaluated instantiation is provided.
        - Authors must not treat demonstration as evaluation unless acceptance criteria and evidence are defined.
        - Authors must not omit limitations that affect contribution scope.
  - id: information_items
    title: Information Items and Records
    purpose: Define DSR-specific documentation objects.
    content:
      required_information_items:
        root_or_metadata:
          - artifact-profile.yaml
          - conformance-declaration.yaml
          - package-inventory.yaml
        documentation:
          - docs/protocol/problem-and-objectives.md
          - docs/protocol/design-rationale.md
          - docs/protocol/contribution-claim.md
          - docs/protocol/limitations.md
        records:
          - records/design-decisions/
          - records/dsr-transparency/
          - records/evaluations/
          - records/contributions/
          - records/reviews/
          - records/releases/
          - records/preservation/
        templates_or_downstream_equivalents:
          - problem-and-objectives-template
          - solution-space-record-template
          - build-transparency-record-template
          - demonstration-record-template
          - evaluation-plan-template
          - evaluation-report-template
          - contribution-claim-template
          - contribution-positioning-record-template
          - dsr-transparency-crosswalk-template
      retention_expectations:
        - Preserve design and evaluation records with the release they support.
        - Preserve contribution claims and limitations indefinitely for citable releases.
  - id: workflow
    title: Workflow and Operating Procedure
    purpose: Define DSR lifecycle operations.
    content:
      steps:
        - id: characterize_problem
          action: Describe problem context, stakeholders, constraints, and relevance.
          output: problem_statement
        - id: define_objectives
          action: Convert problem analysis into requirements and success criteria.
          output: objectives_and_requirements
        - id: document_solution_space
          action: Record kernel theories, existing artifacts, solution classes, candidate technologies, and knowledge-base engagement.
          output: solution_space_record
        - id: design_artifact
          action: Document design decisions, artifact components, and underlying logic.
          output: design_rationale
        - id: document_build_transparency
          action: Record construction choices, creative search, alternatives considered, collaboration roles, and emergent changes.
          output: build_transparency_record
        - id: demonstrate
          action: Show artifact use in a relevant context or scenario.
          output: demonstration_record
        - id: evaluate
          action: Evaluate against declared criteria, timing, setting, validity basis, stakeholder confidence basis, and contribution claims.
          output: evaluation_report
        - id: position_contribution
          action: Classify contribution type, knowledge goal, knowledge scope, novelty basis, practice value, scientific value, and transfer conditions.
          output: contribution_positioning_record
        - id: generalize
          action: State reusable knowledge, scope conditions, and limitations.
          output: contribution_claim
        - id: communicate
          action: Prepare artifact package, appendix, release, and publication material.
          output: publication_ready_package
      decision_points:
        - Is the artifact type correctly declared?
        - Is evaluation sufficient for the target claim?
        - Is the evaluation artificial, naturalistic, or mixed, and is that setting justified?
        - Is the contribution case-specific or generalized?
        - Is any demonstration being incorrectly used as evaluation?
      failure_modes:
        - artifact_type_mismatch
        - untested_claim
        - missing_design_rationale
        - unsupported_generalization
        - demonstration_conflated_with_evaluation
        - missing_problem_or_solution_space_transparency
        - contribution_positioning_missing_or_overstated
  - id: quality_and_conformance
    title: Quality and Conformance
    purpose: Define DSR quality criteria.
    content:
      quality_dimensions:
        - epistemic_rigor
        - contribution_clarity
        - evaluation_alignment
        - artifact_utility
        - generalization_transparency
        - dsr_transparency
      acceptance_criteria:
        - Artifact type, lifecycle stage, contribution claim, and evaluation evidence are mutually consistent.
        - Claims are bounded by demonstrated evidence.
        - Design rationale connects requirements to artifact components.
        - Limitations and transfer conditions are explicit.
        - Problem-space, solution-space, build, evaluation, and contribution transparency are sufficient for the target conformance level.
        - Demonstration evidence is not treated as evaluation evidence unless acceptance criteria and evaluation evidence are explicit.
      evidence_required:
        - artifact_profile
        - design_decision_records
        - dsr_transparency_crosswalk
        - contribution_positioning_record
        - evaluation_plan
        - evaluation_report
        - claim_evidence_matrix
  - id: traceability
    title: Traceability
    purpose: Define DSR trace links.
    content:
      upstream_dependencies:
        - protocol_foundation
      downstream_outputs:
        - information_item_architecture
        - quality_conformance_and_review_model
        - artifact_package_specification
        - publication_and_registry_model
      trace_links:
        - problem_to_requirement
        - requirement_to_design_decision
        - design_decision_to_component
        - problem_space_to_objectives
        - solution_space_to_design_rationale
        - build_decision_to_alternative
        - component_to_evaluation
        - evaluation_to_claim
        - claim_to_publication_section
  - id: implementation_guidance
    title: Implementation Guidance
    purpose: Implement DSR lifecycle in a repository.
    content:
      repository_locations:
        artifact_profile: metadata/artifact-profile.yaml
        design_records: records/design-decisions/
        transparency_records: records/dsr-transparency/
        contribution_positioning_records: records/contributions/
        evaluation_records: records/evaluations/
        claims: docs/protocol/contribution-claim.md
      examples:
        - A software tool may be both an instantiation and a method when the reusable procedure is explicit.
        - A taxonomy may be a construct artifact even when no executable artifact exists.
      anti_patterns:
        - evaluation evidence disconnected from claims.
        - contribution claims copied from the paper without artifact-specific evidence.
        - hiding failed demonstrations.
      automation_hooks:
        - require evaluation record IDs for claims marked evaluated.
        - require DSR transparency crosswalk completion for L2 and above.
        - require contribution-positioning record for DSR packages with contribution claims.
        - require limitation text for L3 and above.
  - id: template_or_schema_implications
    title: Template or Schema Implications
    purpose: Define DSR fields for templates and schemas.
    content:
      artifact_profile_fields:
        - artifact_type
        - knowledge_scope
        - knowledge_goal
        - lifecycle_stage
        - design_strategy
        - problem_space
        - solution_space
        - stakeholders
        - context_constraints
        - kernel_theories_or_justificatory_knowledge
        - existing_artifacts_or_solution_classes
        - build_process_summary
        - alternatives_considered
        - design_decision_records
        - contribution_positioning
        - transfer_conditions
        - dsr_transparency
        - contribution_claims
        - evaluation_records
        - limitations
      evaluation_plan_fields:
        - evaluation_timing
        - evaluation_setting
        - evaluation_method_family
        - technical_validity
        - purpose_validity
        - design_validity
        - generalization_validity
        - stakeholder_confidence_basis
        - claim_to_component_mapping
  - id: open_questions_and_backlog
    title: Open Questions and Backlog
    purpose: Preserve DSR issues for pilot testing.
    content:
      open_questions:
        - id: oq-dsr-domain-variants
          question: Which domain-specific DSR variants should receive optional template extensions?
          status: open
      backlog:
        - Create an example claim-evidence matrix for a pilot artifact.
quality_gates:
  - id: qg-dsr-artifact-type
    question: Is the artifact type declared and justified?
    evidence_required: [artifact_profile, design_rationale]
    status: draft_pass
  - id: qg-dsr-evaluation-alignment
    question: Does evaluation evidence support the contribution claim?
    evidence_required: [evaluation_plan, evaluation_report, claim_evidence_matrix]
    status: draft_pass
  - id: qg-dsr-generalization
    question: Are generalization and limitation statements bounded by evidence?
    evidence_required: [contribution_claim, limitations]
    status: draft_pass
  - id: qg-dsr-transparency
    question: Is the six-part DSR transparency crosswalk complete or explicitly tailored?
    evidence_required: [dsr_transparency_crosswalk, artifact_profile, review_record]
    status: draft_pass
  - id: qg-dsr-evaluation-strategy
    question: Does the evaluation plan declare timing, setting, method family, validity basis, and claim-to-component mapping?
    evidence_required: [evaluation_plan, traceability_matrix]
    status: draft_pass
  - id: qg-dsr-contribution-positioning
    question: Is the contribution positioned against declared artifact type, knowledge scope, knowledge goal, novelty basis, and transfer conditions?
    evidence_required: [contribution_positioning_record, contribution_claim]
    status: draft_pass
