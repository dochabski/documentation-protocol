# SPDX-License-Identifier: CC0-1.0
product:
  id: service_integration_profile
  title: Recommended Service Integration Profile
  purpose: Define nonblocking, vendor-neutral service roles that protocol-governed artifact packages should consider for storage,
    source control, persistent identification, archival deposit, metadata indexing, educational dissemination, public communication,
    open peer review, open-science sustainability, and long-form publication.
  status: l4_reusable_stable
version: "1.0.0"
source_basis:
- md_guides
- data_and_information
- protocol_project_decision
dependencies:
- protocol_foundation
- repository_architecture
- metadata_and_identifier_profile
- publication_and_registry_model
sections:
- id: identity_and_purpose
  title: Identity and Purpose
  content:
    profile_identity:
      name: Recommended Service Integration Profile
      object_type: nonblocking_service_role_guidance
      obligation_strength: should
      conformance_effect: advisory_unless_underlying_evidence_required_elsewhere
    guiding_principle: The protocol recommends service roles and evidence patterns rather than mandating named third-party
      platforms, memberships, accounts, or user-specific service choices.
    primary_outputs:
    - service_role_model
    - service_candidate_vocabulary
    - service_integration_template
    - service_integration_readiness_checklist
    - service_integration_record
    - non_normative_example_profiles
    - service_candidate_catalog
- id: conceptual_model
  title: Conceptual Model
  content:
    terms:
      service_role: A functional role that supports the artifact lifecycle.
      service_candidate: A named platform, registry, index, archive, community, infrastructure service, or equivalent mechanism
        that may satisfy a service role.
      service_profile: A project-level declaration of intended or actual services.
      service_integration_record: Retained evidence of used, substituted, deferred, omitted, or non-applicable service roles.
      non_normative_example_profile: A reusable example showing one maintainer or project ecosystem without making those service
        choices required for other users.
    branch_policy:
      use_branches_for:
      - feature_development
      - pull_request_review
      - release_lines_when_needed
      do_not_use_branches_for:
      - long_lived_user_specific_service_variants
      - normative_vendor_forks
      preferred_variant_location: examples/service-profiles/
    validation_severity_policy:
      missing_optional_role: info
      missing_recommended_role: warning
      missing_highly_recommended_role: warning
      named_service_required_by_schema: error
      secret_or_token_pattern_detected: error
      github_used_as_sole_archive_for_l5: error
      membership_service_marked_required_for_all_users: error
