    - schemas/service-integration-profile.schema.json
    - docs/protocol/recommended-service-ecosystem.md
    optional_example_location: examples/service-profiles/
    optional_service_candidate_catalog: examples/service-profiles/service-candidate-catalog-v0-2.yaml
- id: workflow
  title: Workflow
  content:
    steps:
    - id: identify_service_roles
      action: Review the service-role vocabulary and decide which roles apply.
      output: applicable_service_roles
    - id: select_services_or_equivalents
      action: Select candidate services, local equivalents, institutional equivalents, discipline-specific services, or substitutions.
      output: draft_service_profile
    - id: capture_service_evidence
      action: Record URLs, DOIs, identifiers, release records, review records, or omission rationales without exposing secrets.
      output: service_integration_record
    - id: review_nonblocking_warnings
      action: Review missing recommended roles and decide whether to add, defer, substitute, or omit with rationale.
      output: service_readiness_checklist
- id: implementation_guidance
  title: Implementation Guidance
  content:
    implementation_branch_recommendation: feature/service-integration-profile-bookmarks-v2
    personal_profile_policy: User-specific choices belong in non-normative example profiles or project-specific profile files,
      not permanent Git branches.
    automation_hooks:
    - validate service profile syntax.
    - warn when highly recommended roles are missing without rationale.
    - fail when a named service is encoded as required.
    - fail when secret-like values appear in public service profile fields.
    - fail when L5 package treats GitHub as the sole archival preservation mechanism.
    - warn when a membership or account-dashboard service is listed without a public-safe evidence note.
    codex_use_note: Codex may update YAML, docs, examples, schemas, and checklists, but it should not publish credentials,
      authenticate to third-party services, or create public deposits unless separately instructed by the maintainer.
quality_gates:
- id: qg-service-role-neutrality
  question: Does the profile recommend service roles without requiring named platforms?
  evidence_required:
  - service_role_model
  - service_candidate_vocabulary
  status: l4_reusable_stable_pass
- id: qg-service-evidence
  question: Are selected services, substitutions, and omissions documented without exposing secrets?
  evidence_required:
  - service_integration_profile
  - service_integration_record
  status: l4_reusable_stable_pass
- id: qg-service-variant-location
  question: Are personal or project-specific choices stored as profiles rather than long-lived branches?
  evidence_required:
  - example_profile
  - branch_policy
  status: l4_reusable_stable_pass
