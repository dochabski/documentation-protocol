- id: normative_requirements
  title: Normative Requirements
  content:
    must:
    - Service integration profiles must distinguish service roles from named service candidates.
    - Named third-party platforms, memberships, dashboards, personal accounts, and proprietary services must not be required
      for protocol conformance.
    - Service profiles must not include secrets, access tokens, passwords, private API keys, unpublished credentials, or private
      account-console URLs.
    - Personal or project-specific service profiles must be marked non-normative unless adopted by a project as its own declared
      profile.
    should:
    - Projects should complete a service integration profile before L4 or L5 review.
    - Projects should use DOI-backed archival deposit or an equivalent preservation mechanism for publication-ready releases.
    - Projects should link repository, archive, citation, registry, organizational identifiers, contributor identifiers, and
      related-publication records when available.
    - Projects should use persistent contributor identifiers and, where applicable, organization identifiers.
    - Projects should treat open peer review, preprint dissemination, and public communication channels as optional dissemination
      layers rather than conformance requirements.
    may:
    - Projects may use any service, local equivalent, institutional equivalent, or discipline-specific repository that satisfies
      the documented role.
    - Projects may omit optional dissemination, peer review, community, and sustainability roles when they are not relevant
      to the artifact audience.
    - Projects may include user-specific service choices as non-normative examples in examples/service-profiles/.
    must_not:
    - Projects must not treat GitHub or any working repository alone as archival preservation.
    - Projects must not imply that service-profile use creates an obligation to publish on every listed platform.
    - Projects must not use long-lived Git branches as the primary mechanism for representing user-specific service choices.
    - Projects must not present membership organizations such as Crossref, DataCite, SCOSS, or FORCE11 as mandatory for ordinary
      protocol users.
