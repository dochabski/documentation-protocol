# SPDX-License-Identifier: CC0-1.0
artifact_package_readiness_checklist:
  purpose: Check whether an artifact package is ready for review or release.
  checks:
    - id: package-profile-present
      question: Is artifact-profile.yaml complete?
      evidence_required: [artifact-profile.yaml]
      required_for: [l1_documented, l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: metadata-present
      question: Are required metadata and citation files present or explicitly deferred?
      evidence_required: [metadata.yaml, CITATION.cff]
      required_for: [l1_documented, l5_archival_publication_ready]
    - id: inventory-matches-files
      question: Does the package inventory match repository contents?
      evidence_required: [package-inventory.yaml, repository_tree]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: claims-have-evidence
      question: Do artifact claims trace to evaluation or review evidence?
      evidence_required: [traceability-matrix.yaml, evaluation-report.yaml]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: dsr-transparency-crosswalk-complete
      question: Is the DSR transparency crosswalk complete or explicitly tailored for the package?
      evidence_required: [checklists/dsr-transparency-crosswalk-checklist.yaml, artifact-profile.yaml]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: contribution-positioning-present
      question: Is the DSR contribution positioned by artifact type, knowledge scope, knowledge goal, contribution type, and transfer conditions?
      evidence_required: [contribution-positioning-record.yaml, contribution-claim.yaml, artifact-profile.yaml]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: evaluation-strategy-declared
      question: Does the evaluation plan declare timing, setting, method family, validity basis, stakeholder confidence basis, and claim-to-component mapping?
      evidence_required: [evaluation-plan.yaml, traceability-matrix.yaml]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: demonstration-not-evaluation
      question: Is any demonstration separated from evaluation unless acceptance criteria, evidence, and evaluation claims are defined?
      evidence_required: [demonstration-record, evaluation-plan.yaml, evaluation-report.yaml]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: use-path-present
      question: Is there a clear use, inspection, or reproduction procedure?
      evidence_required: [usage-procedure.md, environment.yaml]
      required_for: [l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: limitations-present
      question: Are known limitations and non-goals explicit?
      evidence_required: [limitations.md]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: license-declared
      question: Does the artifact package declare its own license rather than inheriting the protocol license?
      evidence_required: [LICENSE, metadata.yaml, artifact-profile.yaml]
      required_for: [l1_documented, l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: license-compatible-with-contents
      question: Is the declared license compatible with the artifact contents, dependencies, and included third-party materials?
      evidence_required: [LICENSE, metadata.yaml, third-party-materials-record]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: third-party-materials-identified
      question: Are third-party materials, trademarks, data restrictions, and external rights constraints identified?
      evidence_required: [third-party-materials-record, package-inventory.yaml]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: downstream-reuse-constraints-documented
      question: Are downstream reuse constraints documented, including any reason a highly open license cannot be used?
      evidence_required: [artifact-profile.yaml, metadata.yaml, limitations.md]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
    - id: ai-indexing-training-preference-documented
      question: Is the artifact owner's preference for AI indexing/training documented where relevant?
      evidence_required: [artifact-profile.yaml, metadata.yaml]
      required_for: [l2_reviewable, l3_exercisable, l4_reusable, l5_archival_publication_ready]
