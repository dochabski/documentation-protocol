# SPDX-License-Identifier: CC0-1.0
review_checklist:
  purpose: Guide completeness, preliminary, and full artifact review.
  checks:
    - id: target-conformance-declared
      question: Is the target conformance level declared?
      evidence_required: [artifact-profile.yaml]
    - id: required-files-present
      question: Are required files present for the declared level?
      evidence_required: [package-inventory.yaml]
    - id: evidence-inspected
      question: Did the reviewer inspect evidence supporting each major claim?
      evidence_required: [traceability-matrix.yaml, evaluation-report.yaml]
    - id: dsr-transparency-reviewed
      question: Did the reviewer inspect process, problem-space, solution-space, build, evaluation, and contribution transparency?
      evidence_required: [dsr-transparency-crosswalk-checklist.yaml, artifact-profile.yaml, review-record.yaml]
    - id: evaluation-strategy-reviewed
      question: Does the evaluation strategy distinguish formative/summative timing, artificial/naturalistic setting, method family, and validity basis?
      evidence_required: [evaluation-plan.yaml, evaluation-report.yaml]
    - id: demonstration-not-evaluation
      question: Is demonstration kept separate from evaluation unless acceptance criteria and evidence are defined?
      evidence_required: [demonstration-record, evaluation-plan.yaml, evaluation-report.yaml]
    - id: contribution-positioning-reviewed
      question: Is the contribution positioning credible for the declared artifact type, knowledge scope, knowledge goal, novelty basis, and transfer conditions?
      evidence_required: [contribution-positioning-record.yaml, contribution-claim.yaml, limitations.md]
    - id: use-path-tested
      question: Was the open, install, run, use, or inspect path checked where applicable?
      evidence_required: [usage-procedure.md, review-record.yaml]
    - id: limitations-reviewed
      question: Are limitations accurate and visible?
      evidence_required: [limitations.md]
    - id: findings-recorded
      question: Are findings, decisions, and required author responses recorded?
      evidence_required: [review-record.yaml]
