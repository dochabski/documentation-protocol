release_publication_checklist:
  purpose: Check release, archival, citation, and registry readiness.
  checks:
    - id: release-approved
      question: Is there a release approval record?
      evidence_required: [release-record.yaml, review-record.yaml]
    - id: metadata-frozen
      question: Was metadata frozen before the release tag?
      evidence_required: [metadata-freeze-record.yaml]
    - id: tag-created
      question: Is the release tied to a version tag?
      evidence_required: [release-record.yaml]
    - id: archive-ready
      question: Is the release ready for archival deposit or already deposited?
      evidence_required: [.zenodo.json, preservation-record.yaml]
    - id: citation-ready
      question: Do citation files point to the correct release and identifier?
      evidence_required: [CITATION.cff, codemeta.json, metadata.yaml]
    - id: licensing-ready
      question: Are artifact license, code license where applicable, third-party material rights, downstream reuse constraints, and AI indexing/training preference documented?
      evidence_required: [LICENSE, metadata.yaml, artifact-profile.yaml, third-party-materials-record]
    - id: dsr-publication-summary-ready
      question: For DSR releases, do publication materials summarize transparency, contribution positioning, evaluation strategy, transfer conditions, and limitations?
      evidence_required: [dsr-transparency-crosswalk.yaml, contribution-positioning-record.yaml, evaluation-plan.yaml, artifact-appendix.md]
    - id: practitioner-communication-ready
      question: When practice adoption or adaptation is claimed, are practitioner-facing guidance, demonstration material, tutorials, adaptation notes, or videos present or explicitly deferred?
      evidence_required: [practitioner-guide.md, adaptation-notes.md, release-record.yaml]
    - id: service-integration-profile-reviewed
      question: For L4/L5 packages, has the service integration profile been reviewed, with DOI archive/equivalent preservation and metadata/indexing roles addressed or deferred with rationale?
      evidence_required: [service-integration-profile.yaml, service-integration-readiness-checklist.yaml, preservation-record.yaml]
    - id: registry-ready
      question: Does registry metadata match release metadata?
      evidence_required: [registry-submission-record.yaml, release-record.yaml]
